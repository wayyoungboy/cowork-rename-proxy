# ========================================
# 服务配置
# ========================================
host: "0.0.0.0"   # 监听地址
port: 18080        # 监听端口

# ========================================
# TLS
# ========================================
tls: true                        # 是否开启 HTTPS
tls_cert: ""                     # 证书路径（推荐 mkcert 生成）
tls_key:  ""                     # 私钥路径（推荐 mkcert 生成）

# ========================================
# 当前激活的 Provider
# ========================================
current_provider: "dashscope"    # 从 providers 列表中选择一个

# ========================================
# Provider 列表
# ========================================
providers:
  - name: "dashscope"
    base_url: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
    api_key: ""                  # 留空则转发客户端的 key
    mode: "force"                # force / prefix / ""(透明转发)
    target_model: "glm-5.1"      # force 模式目标
    model_prefix: "claude-"      # prefix 模式前缀
    models:                      # 支持的模型列表，空=全部接受
      - "glm-5.1"
      - "claude-glm-5.1"

  - name: "openrouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key: ""                  # 填入你的 API Key
    models:
      - "claude-sonnet-4-6"
      - "claude-sonnet-4.6"

# ========================================
# /v1/models 返回时追加的额外模型
# ========================================
mock_models:
  - "claude-sonnet-4-6"
  - "claude-sonnet-4.6"
