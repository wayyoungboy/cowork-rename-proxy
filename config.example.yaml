# ========================================
# 服务配置
# ========================================
host: "0.0.0.0"   # 监听地址
port: 18080        # 监听端口

# ========================================
# TLS
# ========================================
tls: true                        # 是否开启 HTTPS
tls_cert: ""                     # 证书路径（留空则自动生成自签证书）
tls_key:  ""                     # 私钥路径（留空则自动生成）

# ========================================
# 代理目标
# ========================================
upstream_base_url: ""  # 留空则转发失败，请填写实际上游地址

# ========================================
# 模型配置
# ========================================
# mode 可选值：
#   "force"  — 统一代理：所有请求都强制改写为 target_model
#   "prefix" — 前缀模式：claude-X 改写为 X（去前缀转发，响应加前缀返回）
#   ""       — 透明转发：不改写任何模型，直接代理到上游（不拦截 /v1/models）
mode: "force"

target_model: "glm-5.1"  # force 模式下强制使用的模型
model_prefix: "claude-"        # prefix 模式下添加/去除的前缀

# /v1/models 端点返回的伪造模型列表（cowork 依赖此接口）
mock_models:
  - "claude-glm-5.1"
  - "glm-5.1"
  - "claude-sonnet-4-6"
  - "claude-sonnet-4.6"
